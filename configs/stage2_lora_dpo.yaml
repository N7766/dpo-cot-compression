experiment:
  name: qwen3_8b_gsm8k_cot_compression_lora_dpo
  stage: stage2
  method: lora_dpo
  seed: 42

model:
  base_model_name_or_path: Qwen/Qwen3-8B
  trust_remote_code: true
  torch_dtype: bfloat16
  attn_implementation: sdpa

data:
  train_file: data/preference/stage1_gsm8k_qwen3_rejected_glm52_chosen_train.jsonl
  val_file: data/preference/stage1_gsm8k_qwen3_rejected_glm52_chosen_val.jsonl
  prompt_field: prompt
  chosen_field: chosen
  rejected_field: rejected
  max_prompt_length: 512
  max_length: 2048

lora:
  r: 8
  alpha: 16
  dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

dpo:
  beta: 0.1
  loss_type: sigmoid
  precompute_ref_log_probs: false
  precompute_ref_batch_size: null

training:
  num_train_epochs: 1
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 16
  learning_rate: 5.0e-6
  warmup_ratio: 0.03
  weight_decay: 0.0
  lr_scheduler_type: cosine
  gradient_checkpointing: true
  gradient_checkpointing_kwargs:
    use_reentrant: false
  bf16: true
  fp16: false
  optim: adamw_torch
  logging_steps: 10
  eval_steps: 100
  save_steps: 100
  save_total_limit: 3
  report_to:
    - tensorboard

paths:
  output_dir: outputs/checkpoints/stage2_lora_dpo/qwen3_8b_gsm8k_cot_compression_lora
  merged_output_dir: outputs/checkpoints/stage2_lora_dpo/qwen3_8b_gsm8k_cot_compression_lora_merged
  logging_dir: outputs/logs/stage2_lora_dpo/qwen3_8b_gsm8k_cot_compression_lora
  metrics_dir: outputs/results/stage2_lora_dpo
  eval_generation_dir: outputs/generations/stage2_eval/lora_dpo

hub:
  push_to_hub: false
  repo_id: null
